name: Terraform Plan

on:
  pull_request:
    branches:
      - dev
      - staging
      - main

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  plan:
    name: Plan - ${{ github.base_ref }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.4

      - name: Set working directory
        id: env
        run: |
          if [ "${{ github.base_ref }}" == "dev" ]; then
            echo "working_dir=environments/dev/aws" >> $GITHUB_OUTPUT
          elif [ "${{ github.base_ref }}" == "staging" ]; then
            echo "working_dir=environments/staging/aws" >> $GITHUB_OUTPUT
          elif [ "${{ github.base_ref }}" == "main" ]; then
            echo "working_dir=environments/prod/aws" >> $GITHUB_OUTPUT
          fi

      - name: Terraform Init
        working-directory: ${{ steps.env.outputs.working_dir }}
        run: terraform init -reconfigure

      - name: Terraform Plan
        id: plan
        working-directory: ${{ steps.env.outputs.working_dir }}
        run: |
          terraform plan -no-color 2>&1 | tee plan_output.txt
          echo "exitcode=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Post Plan as PR Comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ steps.env.outputs.working_dir }}/plan_output.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.substring(0, 60000) + '\n...(truncated)' : plan;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### Terraform Plan — \`${{ github.base_ref }}\`\n\`\`\`\n${truncated}\n\`\`\``
            });
