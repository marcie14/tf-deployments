name: Terraform Apply

on:
  push:
    branches:
      - dev
      - staging
      - main

permissions:
  id-token: write
  contents: read

jobs:
  apply:
    name: Apply - ${{ github.ref_name }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.4

      - name: Set working directory
        id: env
        run: |
          if [ "${{ github.ref_name }}" == "dev" ]; then
            echo "working_dir=environments/dev/aws" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_name }}" == "staging" ]; then
            echo "working_dir=environments/staging/aws" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_name }}" == "main" ]; then
            echo "working_dir=environments/prod/aws" >> $GITHUB_OUTPUT
          fi

      - name: Terraform Init
        working-directory: ${{ steps.env.outputs.working_dir }}
        run: terraform init -reconfigure

      - name: Terraform Apply
        working-directory: ${{ steps.env.outputs.working_dir }}
        run: terraform apply -auto-approve
